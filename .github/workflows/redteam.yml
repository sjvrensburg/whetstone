name: Red-Team Release Gate

on:
  push:
    branches: [main, feat/*]
    paths:
      - 'src/guard/**'
      - 'src/providers/**'
      - 'src/telemetry/**'
      - 'test/redteam/**'
      - 'test/fixtures/redteam/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/guard/**'
      - 'src/providers/**'
      - 'src/telemetry/**'
      - 'test/redteam/**'
      - 'test/fixtures/redteam/**'
  # Periodic live mode: runs weekly against recorded fixtures
  schedule:
    - cron: '17 3 * * 1' # Monday 03:17 UTC

jobs:
  redteam-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run red-team gate (recorded fixtures)
        run: npx vitest run test/redteam/gate.test.ts test/unit/redteam/gate.test.ts --reporter=verbose

      - name: Run full unit test suite
        run: npm run test:unit

      - name: Check coverage thresholds
        run: npx vitest run --coverage
