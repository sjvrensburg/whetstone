name: tui-ci

on:
  push:
    paths:
      - 'tui/**'
      - '.github/workflows/tui-ci.yml'
  pull_request:
    paths:
      - 'tui/**'
      - '.github/workflows/tui-ci.yml'

defaults:
  run:
    working-directory: tui

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tui/target
          key: ${{ runner.os }}-tui-${{ hashFiles('tui/Cargo.lock') }}
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
